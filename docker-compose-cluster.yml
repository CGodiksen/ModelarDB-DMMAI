x-aws-variables: &aws-variables
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_DEFAULT_REGION: eu-central-1
  AWS_ENDPOINT: http://minio-server:9000
  AWS_ALLOW_HTTP: true

services:
  # Object store services.
  minio-server:
    image: minio/minio
    container_name: minio-server
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server --console-address ":9001" /data

  create-bucket:
    image: minio/mc
    container_name: create-bucket
    depends_on:
      - minio-server
    entrypoint:
      /bin/sh -c "
      sleep 2;
      /usr/bin/mc alias set modelardb-minio http://minio-server:9000 minioadmin minioadmin;
      /usr/bin/mc mb modelardb-minio/modelardb;
      /usr/bin/mc mb modelardb-minio/datasets;
      exit 0;
      "

  # ModelarDB services.
  modelardb-edge-1:
    image: cgodiksen/modelardb
    container_name: modelardb-edge-1
    command: [ "target/release/modelardbd", "edge", "data/edge", "s3://modelardb" ]
    ports:
      - "9991:9991"
    environment:
      <<: *aws-variables
      MODELARDBD_IP_ADDRESS: modelardb-edge-1
      MODELARDBD_PORT: 9991
    depends_on:
      create-bucket:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "echo", "ready" ]
      interval: 2s

  modelardb-edge-2:
    image: cgodiksen/modelardb
    container_name: modelardb-edge-2
    command: [ "target/release/modelardbd", "edge", "data/edge", "s3://modelardb" ]
    ports:
      - "9992:9992"
    environment:
      <<: *aws-variables
      MODELARDBD_IP_ADDRESS: modelardb-edge-2
      MODELARDBD_PORT: 9992
    depends_on:
      modelardb-edge-1:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "echo", "ready" ]
      interval: 2s

  modelardb-cloud:
    image: cgodiksen/modelardb
    container_name: modelardb-cloud
    command: [ "target/release/modelardbd", "cloud", "data/cloud", "s3://modelardb" ]
    ports:
      - "9999:9999"
    environment:
      <<: *aws-variables
      MODELARDBD_IP_ADDRESS: modelardb-cloud
      MODELARDBD_PORT: 9999
    depends_on:
      modelardb-edge-2:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "echo", "ready" ]
      interval: 2s

  # Service to ingest data into edge nodes.
  modelardb-ingest:
    build: ./ingest_data/.
    image: modelardb-ingest
    container_name: modelardb-ingest
    depends_on:
      modelardb-cloud:
        condition: service_healthy
